<body>
<h1>Test your reflex!</h1>
<section id="instructions">
    <p>Click the <strong>"Start"</strong> button and wait until the game area changes color, then click it as quickly as possible.</p>
    <p>You have <strong>5</strong> tries to get your fastest reaction time.</p>
</section>
<section id="game-area">
Click here
</section>
<section id="controls">
    <button id="start-button">Start</button>
    <button id="stop-button" disabled>Stop</button>
</section>

<section id="score-area">
    <p>Fastest: <span id="min-time">--</span> ms</p>
    <p>Slowest: <span id="max-time">--</span> ms</p>
    <p>Average: <span id="avg-time">--</span> ms</p>
</section>

<script src="script.js"></script>
</body>
